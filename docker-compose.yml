version: "3.8"

services:
  smartcontainer:
    build: .
    container_name: smartcontainer-risk-engine
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./output:/app/output
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
